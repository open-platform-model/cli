name: PR Checks
on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  OPM_REGISTRY: 'opmodel.dev=localhost:5000+insecure,registry.cue.works'
  CUE_REGISTRY: 'opmodel.dev=localhost:5000+insecure,registry.cue.works'

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: '1.26.0'
      - name: golangci-lint
        uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9.3.0
        with:
          version: v2.11.3
          args: --timeout=5m

  unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: '1.26.0'
      - name: Run unit tests
        run: go test ./internal/...

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: '1.26.0'
      - name: Install kind
        run: |
          KIND_VERSION="v0.31.0"
          curl -Lo ./kind "https://kind.sigs.k8s.io/dl/${KIND_VERSION}/kind-linux-amd64"
          echo "eb244cbafcc157dff60cf68693c14c9a75c4e6e6fedaf9cd71c58117cb93e3fa  ./kind" | sha256sum -c -
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind
      - name: Create kind cluster
        run: kind create cluster --name opm-dev --config hack/kind-config.yaml --image kindest/node:v1.34.3@sha256:08497ee19eace7b4b5348db5c6a1591d7752b164530a36f855cb0f2bdcbadd48
      - name: Install ModuleInstance CRDs
        # The CLI records inventory in the ModuleInstance CR, so the CRD is a
        # hard prerequisite for every apply-path integration program.
        run: go run ./cmd/opm operator install --crds-only --context kind-opm-dev
      - name: Run integration scripts
        run: |
          go run tests/integration/deploy/main.go
          go run tests/integration/inventory-apply/main.go
          go run tests/integration/inventory-ops/main.go
          go run tests/integration/inst-list/main.go
          go run tests/integration/migration/main.go
          go run tests/integration/gates/main.go
      - name: Delete kind cluster
        if: always()
        run: kind delete cluster --name opm-dev || true

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: '1.26.0'
      - name: Run E2E tests
        run: go test ./tests/e2e/... -v
