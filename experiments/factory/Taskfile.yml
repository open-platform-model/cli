version: "3"

silent: false

vars:
  EXEC_DIR: "{{.ROOT_DIR}}/cmd"
  CUE_MODULE_DIR: "{{.ROOT_DIR}}/v1alpha1"
  MINECRAFT_RELEASE_DIR: "{{.CUE_MODULE_DIR}}/examples/releases/minecraft"

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  run:
    desc: "Render the minecraft release with default Paper server values"
    dir: "{{.ROOT_DIR}}"
    cmds:
      - go run {{.EXEC_DIR}}

  run:bundle:
    desc: "Render the gamestack bundle release (Minecraft + Velocity proxy)"
    dir: "{{.ROOT_DIR}}"
    cmds:
      - go run {{.EXEC_DIR}}
        -release {{.CUE_MODULE_DIR}}/examples/releases/gamestack/

  run:forge:
    desc: "Render the minecraft release with Forge modded server values"
    dir: "{{.ROOT_DIR}}"
    cmds:
      - go run {{.EXEC_DIR}}
        -values {{.MINECRAFT_RELEASE_DIR}}/values_forge.cue

  run:fabric:
    desc: "Render the minecraft release with Fabric + Modrinth mods values"
    dir: "{{.ROOT_DIR}}"
    cmds:
      - go run {{.EXEC_DIR}}
        -values {{.MINECRAFT_RELEASE_DIR}}/values_fabric_modrinth.cue

  run:paper-restic:
    desc: "Render the minecraft release with Paper + restic backup values"
    dir: "{{.ROOT_DIR}}"
    cmds:
      - go run {{.EXEC_DIR}}
        -values {{.MINECRAFT_RELEASE_DIR}}/values_paper_restic.cue

  fmt:cue:
    desc: "Format all CUE files in the factory v1alpha1 module"
    dir: "{{.CUE_MODULE_DIR}}"
    cmds:
      - cue fmt ./...

  vet:cue:
    desc: "Vet all CUE packages in the factory v1alpha1 module"
    dir: "{{.CUE_MODULE_DIR}}"
    cmds:
      - cue vet ./...

  vet:go:
    desc: "Vet all Go packages in the factory experiment"
    dir: "{{.ROOT_DIR}}"
    cmds:
      - go vet {{.ROOT_DIR}}/...

  vet:
    desc: "Vet CUE and Go"
    cmds:
      - task: vet:cue
      - task: vet:go
