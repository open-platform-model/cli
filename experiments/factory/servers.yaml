# release: my-game-stack-creative
# component: server
# transformer: opmodel.dev/providers/kubernetes/transformers/statefulset-transformer@v1
apiVersion: apps/v1
kind: StatefulSet
metadata:
  labels:
    app.kubernetes.io/name: server
    app.kubernetes.io/managed-by: open-platform-model
    module-release.opmodel.dev/name: my-game-stack-creative
    module-release.opmodel.dev/uuid: 4ba5c2d5-175a-5d1b-a4a4-531e41e5244e
    module.opmodel.dev/name: minecraft-java
    component.opmodel.dev/name: server
    core.opmodel.dev/workload-type: stateful
    module.opmodel.dev/uuid: a477d8d4-72d0-5217-b7f3-2193e6bf3d4c
    app.kubernetes.io/instance: server
    module.opmodel.dev/version: 0.3.0
  name: my-game-stack-creative-server
  namespace: game-stack
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: server
      module-release.opmodel.dev/name: my-game-stack-creative
      component.opmodel.dev/name: server
      core.opmodel.dev/workload-type: stateful
  serviceName: my-game-stack-creative-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: server
        module-release.opmodel.dev/name: my-game-stack-creative
        component.opmodel.dev/name: server
        core.opmodel.dev/workload-type: stateful
    spec:
      containers:
        - env:
            - name: ENABLE_RCON
              value: "true"
            - name: EULA
              value: "true"
            - name: RCON_PASSWORD
              valueFrom:
                secretKeyRef:
                  key: rcon-password
                  name: my-game-stack-creative-server-secrets
            - name: RCON_PORT
              value: "25575"
            - name: TYPE
              value: PAPER
            - name: USE_AIKAR_FLAGS
              value: "true"
            - name: VERSION
              value: LATEST
            - name: MAX_PLAYERS
              value: "10"
            - name: DIFFICULTY
              value: normal
            - name: MODE
              value: survival
            - name: PVP
              value: "true"
            - name: ENABLE_COMMAND_BLOCK
              value: "false"
            - name: VIEW_DISTANCE
              value: "10"
            - name: ALLOW_NETHER
              value: "true"
            - name: ANNOUNCE_PLAYER_ACHIEVEMENTS
              value: "true"
            - name: FORCE_GAMEMODE
              value: "false"
            - name: GENERATE_STRUCTURES
              value: "true"
            - name: HARDCORE
              value: "false"
            - name: MAX_BUILD_HEIGHT
              value: "256"
            - name: MAX_TICK_TIME
              value: "60000"
            - name: SPAWN_ANIMALS
              value: "true"
            - name: SPAWN_MONSTERS
              value: "true"
            - name: SPAWN_NPCS
              value: "true"
            - name: SPAWN_PROTECTION
              value: "0"
            - name: LEVEL_TYPE
              value: DEFAULT
            - name: LEVEL
              value: world
            - name: ONLINE_MODE
              value: "true"
            - name: ENFORCE_SECURE_PROFILE
              value: "true"
            - name: OVERRIDE_SERVER_PROPERTIES
              value: "true"
            - name: MEMORY
              value: 2G
          image: itzg/minecraft-server:java21
          imagePullPolicy: IfNotPresent
          livenessProbe:
            exec:
              command:
                - mc-monitor
                - status
                - --port
                - "25565"
            failureThreshold: 3
            periodSeconds: 30
            timeoutSeconds: 5
          name: server
          ports:
            - containerPort: 25565
              name: minecraft
              protocol: TCP
            - containerPort: 25575
              name: rcon
              protocol: TCP
          readinessProbe:
            exec:
              command:
                - mc-monitor
                - status
                - --port
                - "25565"
            failureThreshold: 3
            periodSeconds: 10
            timeoutSeconds: 3
          startupProbe:
            exec:
              command:
                - mc-monitor
                - status
                - --port
                - "25565"
            failureThreshold: 60
            periodSeconds: 10
            timeoutSeconds: 5
          volumeMounts:
            - mountPath: /data
              name: data
        - command:
            - /mc-monitor
            - export-for-prometheus
          env:
            - name: EXPORT_SERVERS
              value: my-game-stack-creative-server:25565
            - name: EXPORT_PORT
              value: "8080"
            - name: TIMEOUT
              value: 1m0s
          image: itzg/mc-monitor:0.16.1
          imagePullPolicy: IfNotPresent
          name: mc-monitor
          ports:
            - containerPort: 8080
              name: metrics
              protocol: TCP
          resources:
            limits:
              cpu: 100m
              memory: 64Mi
            requests:
              cpu: 10m
              memory: 32Mi
      restartPolicy: Always
      securityContext:
        runAsGroup: 3000
        runAsNonRoot: true
        runAsUser: 1000
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: my-game-stack-creative-data
