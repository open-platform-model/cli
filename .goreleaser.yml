version: 2
project_name: opm

builds:
  - main: ./cmd/opm
    binary: opm
    ldflags:
      - -X github.com/opmodel/cli/internal/version.Version={{ .Version }}
      - -X github.com/opmodel/cli/internal/version.GitCommit={{ .Commit }}
      - -X github.com/opmodel/cli/internal/version.BuildDate={{ .Date }}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - name_template: >-
      {{ .ProjectName }}-{{ .Os }}-{{ .Arch }}
    files:
      - LICENSE

release:
  extra_files:
    - glob: LICENSE

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  groups:
    - title: Features
      regexp: '^.*?feat(\(.+\))?!?:.+$'
    - title: Bug Fixes
      regexp: '^.*?fix(\(.+\))?!?:.+$'
    - title: Performance
      regexp: '^.*?perf(\(.+\))?!?:.+$'
    - title: Refactoring
      regexp: '^.*?refactor(\(.+\))?!?:.+$'
    - title: Other
      order: 999
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^ci:'
      - '^chore:'
