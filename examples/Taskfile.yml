version: "3"

silent: true

env:
  CUE_REGISTRY: "opmodel.dev=localhost:5000+insecure,registry.cue.works"

tasks:
  update-deps:
    desc: Update all CUE dependencies to latest versions across example modules
    cmds:
      - |
        find . -name "cue.mod" -type d | sort | while read -r moddir; do
          dir=$(dirname "$moddir")
          printf "==> Updating deps in %s\n" "$dir"
          cd "$dir"

          deps=$(sed -n '/^deps: {$/,/^}$/p' cue.mod/module.cue | grep -oP '"opmodel\.dev(/[^"]+)?@v[^"]*"' | tr -d '"')

          if [ -n "$deps" ]; then
            tmpfile=$(mktemp)

            for dep in $deps; do
              old_ver=$(grep -A5 "\"${dep}\"" cue.mod/module.cue | grep -oP 'v:\s*"\K[^"]+' | head -1)
              printf '%s:%s\n' "$dep" "$old_ver" >> "$tmpfile"
              printf "    cue mod get %s\n" "$dep"
              cue mod get "$dep"
            done

            printf "    cue mod tidy\n"
            cue mod tidy

            while IFS=: read -r dep old_ver; do
              new_ver=$(grep -A5 "\"${dep}\"" cue.mod/module.cue | grep -oP 'v:\s*"\K[^"]+' | head -1)
              if [ "$old_ver" != "$new_ver" ]; then
                printf "    %s: \033[1;33m%s\033[0m -> \033[0;32m%s\033[0m\n" "$dep" "$old_ver" "$new_ver"
              else
                printf "    %s: \033[2m%s (unchanged)\033[0m\n" "$dep" "$old_ver"
              fi
            done < "$tmpfile"

            rm -f "$tmpfile"
          else
            printf "    cue mod tidy\n"
            cue mod tidy
          fi

          cd - > /dev/null
        done
        printf "Done.\n"
